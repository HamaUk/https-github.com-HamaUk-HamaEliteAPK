<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMA UK PLAYER - Web Tester</title>
    <style>
        :root {
            --vu-purple: #7349ea;
            --vu-bg-dark: #0a0a0f;
            --vu-card-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--vu-bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            background: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .header {
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 5px;
        }
        .header h1 span {
            color: var(--vu-purple);
        }
        .device-code {
            font-size: 4rem;
            font-weight: bold;
            color: white;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(115, 73, 234, 0.5);
        }
        .status {
            color: #aaa;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        .card {
            background: linear-gradient(45deg, #2575FC, #6A11CB);
            height: 85px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: white;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(115, 73, 234, 0.3);
        }
        .card i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .card span {
            font-size: 0.8rem;
            font-weight: bold;
        }
        .settings-btn {
            grid-column: span 4;
            background: rgba(255,255,255,0.1);
            height: 50px;
            margin-top: 20px;
        }
        #sync-log {
            margin-top: 30px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #00ff00;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HAMA <span>UK</span></h1>
            <p>WEB TESTER & API DEBUGGER</p>
        </div>

        <div class="status">YOUR 6-DIGIT DEVICE CODE:</div>
        <div class="device-code" id="code">123 456</div>
        
        <button onclick="checkSync()" style="background: var(--vu-purple); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">FORCE SYNC TEST</button>

        <div id="sync-log">Initialing Sync service...</div>

        <div class="grid">
            <div class="card">
                <span>LIVE TV</span>
            </div>
            <div class="card">
                <span>MOVIES</span>
            </div>
            <div class="card">
                <span>SERIES</span>
            </div>
            <div class="card">
                <span>FAVORITES</span>
            </div>
            <div class="card settings-btn">
                <span>SYSTEM SETTINGS</span>
            </div>
        </div>
    </div>

    <script>
        // Use a random code for simulation or the user can change it
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        const formattedCode = code.substring(0,3) + " " + code.substring(3);
        document.getElementById('code').innerText = formattedCode;

        function log(msg) {
            const el = document.getElementById('sync-log');
            el.innerHTML += "<br>> " + msg;
            el.scrollTop = el.scrollHeight;
        }

        async function checkSync() {
            log("Attempting to connect to Firebase...");
            const url = `https://hama-elite-sync-default-rtdb.firebaseio.com/sync/${code}.json`;
            log("Fetching: " + url);
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data) {
                    log("SUCCESS: Data received for code " + code);
                    log("Raw Data: " + JSON.stringify(data));
                    log("Server: " + (data.server || data.url || "N/A"));
                    log("User: " + (data.user || data.username || "N/A"));
                } else {
                    log("PENDING: No data found for this code yet. Use the web portal to activate.");
                }
            } catch (error) {
                log("ERROR: Could not connect to API. Check CORS/Internet.");
            }
        }
        
        checkSync();
    </script>
</body>
</html>
